name: test-pull-request-manual

on:
  workflow_dispatch:

  repository_dispatch:
    types: [unity-mcp-approved-verification]

jobs:
  approval-relay-context:
    name: Validate approval relay context
    runs-on: ubuntu-latest
    steps:
      - name: Validate repository dispatch approval payload
        if: github.event_name == 'repository_dispatch'
        shell: bash
        env:
          HANDOFF_ID: ${{ github.event.client_payload.handoff_id }}
          RECORD_VERSION: ${{ github.event.client_payload.record_version }}
          APPROVAL_GATE: ${{ github.event.client_payload.approval_gate }}
          DISPATCH_PROVENANCE: ${{ github.event.client_payload.dispatch_provenance }}
        run: |
          test -n "$HANDOFF_ID"
          test -n "$RECORD_VERSION"
          test "$APPROVAL_GATE" = "verification_to_cicd"
          test -n "$DISPATCH_PROVENANCE"

      - name: Note manual fallback dispatch
        if: github.event_name == 'workflow_dispatch'
        run: echo "workflow_dispatch is an operator fallback; default v1 relay path is repository_dispatch."

  test-cli:
    needs: [approval-relay-context]
    uses: ./.github/workflows/test_cli.yml

  # --- UNITY TESTS ---
  # -------------------

  # --- EDIT MODE ---

  test-unity-2022-3-62f3-editmode:
    needs: [approval-relay-context]
    uses: ./.github/workflows/test_unity_plugin.yml
    with:
      projectPath: "./Unity-Tests/2022.3.62f3"
      unityVersion: "2022.3.62f3"
      testMode: "editmode"
    secrets: inherit

  test-unity-2023-2-22f1-editmode:
    needs: [approval-relay-context]
    uses: ./.github/workflows/test_unity_plugin.yml
